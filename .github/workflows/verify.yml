name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install jq
        run: brew install jq

      - name: Verify package
        run: ./scripts/verify-all.sh

      - name: Check image assets
        run: sips -g pixelWidth -g pixelHeight assets/banner.png assets/icon.png
