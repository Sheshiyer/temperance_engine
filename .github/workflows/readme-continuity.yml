name: README Continuity

on:
  pull_request:
    branches:
      - main

jobs:
  guard:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install bash 5.x (macos-latest runner ships stock bash 3.2)
        # scripts/readme-continuity-check.sh uses `mapfile` and `${arr[@]}` under
        # `set -u`, both bash 4+ constructs. Homebrew's git is preinstalled on
        # macos-latest but bash is NOT — install it so the script's own
        # `#!/usr/bin/env bash` shebang resolves to a 4+ binary via PATH (brew's
        # bin dir is first in the runner's PATH).
        run: brew install bash

      - name: Validate README continuity for PRs
        run: |
          ./scripts/readme-continuity-check.sh \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}"
